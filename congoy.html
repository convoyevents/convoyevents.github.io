<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Congoy</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Heebo:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f5f0e8;
        --fg: #1a1a2e;
        --blue: #1b4f8a;
        --blue-mid: #2d6bb5;
        --blue-light: #5b9bd5;
        --gold: #c8a04a;
        --gold-light: #e8c97a;
        --stone: #d4c5a9;
        --stone-dark: #b8a88a;
        --cream: #faf6ef;
        --muted: #7a6e5f;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Heebo", sans-serif;
        background: var(--bg);
        color: var(--fg);
        overflow-x: hidden;
        line-height: 1.6;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ===== STAR OF DAVID SVG PATTERN ===== */
      .star-pattern {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        opacity: 0.06;
      }

      /* ===== NAV ===== */
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.2rem 3rem;
        background: rgba(245, 240, 232, 0.88);
        backdrop-filter: blur(16px);
        border-bottom: 2px solid var(--gold);
        z-index: 100;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        cursor: pointer;
        transition: opacity 0.3s;
      }

      .logo-wrap:hover {
        opacity: 0.7;
      }

      .magen {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
      }

      .logo {
        font-family: "Frank Ruhl Libre", serif;
        font-weight: 900;
        letter-spacing: 0.2em;
        font-size: 1.15rem;
        color: var(--blue);
      }

      .logo-hebrew {
        font-family: "Frank Ruhl Libre", serif;
        font-weight: 300;
        font-size: 0.85rem;
        color: var(--gold);
        letter-spacing: 0.05em;
        direction: rtl;
      }

      .nav-links a {
        margin-left: 2rem;
        font-size: 0.8rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--blue);
        font-weight: 700;
        transition: color 0.3s;
        position: relative;
      }

      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--gold);
        transition: width 0.3s ease;
      }

      .nav-links a:hover {
        color: var(--gold);
      }
      .nav-links a:hover::after {
        width: 100%;
      }

      /* ===== HERO ===== */
      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 0 2rem;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(
            ellipse 80% 60% at 50% 30%,
            rgba(27, 79, 138, 0.07) 0%,
            transparent 70%
          ),
          linear-gradient(180deg, var(--cream) 0%, var(--bg) 100%);
      }

      /* Jerusalem stone texture bands */
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 38px,
          rgba(180, 160, 130, 0.07) 38px,
          rgba(180, 160, 130, 0.07) 40px
        );
        pointer-events: none;
      }

      /* Decorative blue stripe — Israeli flag inspired */
      .flag-stripe-top,
      .flag-stripe-bot {
        position: absolute;
        left: 0;
        right: 0;
        height: 6px;
        background: linear-gradient(
          90deg,
          var(--blue) 0%,
          var(--blue-light) 50%,
          var(--blue) 100%
        );
        opacity: 0.9;
      }
      .flag-stripe-top {
        top: 72px;
      }
      .flag-stripe-bot {
        bottom: 0;
      }

      /* Geometric corner ornaments */
      .corner {
        position: absolute;
        width: 120px;
        height: 120px;
        opacity: 0.15;
      }
      .corner-tl {
        top: 90px;
        left: 20px;
      }
      .corner-tr {
        top: 90px;
        right: 20px;
        transform: scaleX(-1);
      }
      .corner-bl {
        bottom: 20px;
        left: 20px;
        transform: scaleY(-1);
      }
      .corner-br {
        bottom: 20px;
        right: 20px;
        transform: scale(-1, -1);
      }

      /* Large background Star of David */
      .bg-star {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 520px;
        height: 520px;
        opacity: 0.04;
        pointer-events: none;
      }

      .hero-inner {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Decorative menorah-row dots */
      .menorah-dots {
        display: flex;
        gap: 0.6rem;
        margin-bottom: 2.5rem;
        align-items: flex-end;
      }
      .menorah-dots span {
        display: block;
        width: 6px;
        border-radius: 3px;
        background: var(--gold);
        animation: flicker 2.8s ease-in-out infinite;
      }
      .menorah-dots span:nth-child(1) {
        height: 20px;
        animation-delay: 0s;
      }
      .menorah-dots span:nth-child(2) {
        height: 26px;
        animation-delay: 0.3s;
      }
      .menorah-dots span:nth-child(3) {
        height: 32px;
        animation-delay: 0.1s;
      }
      .menorah-dots span:nth-child(4) {
        height: 40px;
        animation-delay: 0s;
        background: var(--gold-light);
      }
      .menorah-dots span:nth-child(5) {
        height: 32px;
        animation-delay: 0.2s;
      }
      .menorah-dots span:nth-child(6) {
        height: 26px;
        animation-delay: 0.4s;
      }
      .menorah-dots span:nth-child(7) {
        height: 20px;
        animation-delay: 0.15s;
      }
      .menorah-dots span:nth-child(8) {
        height: 14px;
        animation-delay: 0.5s;
        opacity: 0;
      }
      .menorah-dots span:nth-child(9) {
        height: 40px;
        animation-delay: 0.1s;
        background: var(--blue-mid);
        width: 4px;
      }

      @keyframes flicker {
        0%,
        100% {
          opacity: 1;
          transform: scaleY(1);
        }
        50% {
          opacity: 0.7;
          transform: scaleY(0.96);
        }
      }

      .hero-tag {
        font-family: "Heebo", sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 700;
        margin-bottom: 1rem;
        opacity: 0;
        animation: fadeUp 0.8s 0.2s forwards;
      }

      .hero-title {
        font-family: "Frank Ruhl Libre", serif;
        font-size: clamp(4rem, 14vw, 9rem);
        font-weight: 900;
        letter-spacing: 0.05em;
        line-height: 0.9;
        color: var(--blue);
        margin-bottom: 0.4rem;
        opacity: 0;
        animation: fadeUp 0.9s 0.35s forwards;
        position: relative;
      }

      .hero-title-he {
        font-family: "Frank Ruhl Libre", serif;
        font-size: clamp(1.4rem, 4vw, 2.5rem);
        font-weight: 300;
        direction: rtl;
        color: var(--gold);
        letter-spacing: 0.08em;
        margin-bottom: 2rem;
        opacity: 0;
        animation: fadeUp 0.9s 0.5s forwards;
      }

      .divider {
        width: 80px;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        margin: 0 auto 1.8rem;
        opacity: 0;
        animation: fadeUp 0.8s 0.55s forwards;
      }

      .hero-text {
        font-size: 1rem;
        color: var(--muted);
        max-width: 520px;
        margin-bottom: 3rem;
        font-weight: 300;
        letter-spacing: 0.03em;
        opacity: 0;
        animation: fadeUp 0.8s 0.65s forwards;
      }

      .hero-buttons {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
        opacity: 0;
        animation: fadeUp 0.8s 0.8s forwards;
      }

      .btn {
        border: 2px solid transparent;
        padding: 0.85rem 2.2rem;
        border-radius: 0;
        font-size: 0.75rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        font-weight: 700;
        transition: all 0.3s ease;
        cursor: pointer;
        font-family: "Heebo", sans-serif;
        position: relative;
        overflow: hidden;
      }

      .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: currentColor;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .btn-primary {
        background: var(--blue);
        color: var(--cream);
        border-color: var(--blue);
      }

      .btn-primary:hover {
        background: var(--blue-mid);
        border-color: var(--blue-mid);
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(27, 79, 138, 0.3);
      }

      .btn-outline {
        background: transparent;
        color: var(--blue);
        border-color: var(--gold);
      }

      .btn-outline:hover {
        background: var(--gold);
        color: var(--cream);
        border-color: var(--gold);
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(200, 160, 74, 0.25);
      }

      /* ===== FOOTER ===== */
      footer {
        padding: 3rem 2rem 2rem;
        text-align: center;
        border-top: 2px solid var(--gold);
        background: var(--fg);
        color: rgba(245, 240, 232, 0.5);
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        position: relative;
      }

      .footer-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .footer-logo {
        font-family: "Frank Ruhl Libre", serif;
        font-weight: 900;
        font-size: 1.4rem;
        color: var(--gold);
        letter-spacing: 0.25em;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .footer-he {
        font-family: "Frank Ruhl Libre", serif;
        font-size: 0.9rem;
        color: rgba(200, 160, 74, 0.5);
        direction: rtl;
        font-weight: 300;
      }

      .footer-copy {
        color: rgba(245, 240, 232, 0.3);
        font-size: 0.7rem;
        letter-spacing: 0.15em;
      }

      /* ===== ANIMATIONS ===== */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 600px) {
        nav {
          padding: 1rem 1.5rem;
        }
        .nav-links a {
          margin-left: 1rem;
        }
        .logo-hebrew {
          display: none;
        }
        .corner {
          display: none;
        }
        .bg-star {
          width: 320px;
          height: 320px;
        }
      }
    </style>
  </head>

  <body>
    <nav>
      <div class="logo-wrap" onclick="window.location.href = 'index.html'">
        <!-- Star of David icon -->
        <svg
          class="magen"
          viewBox="0 0 100 100"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <polygon
            points="50,5 93,77.5 7,77.5"
            fill="none"
            stroke="#1b4f8a"
            stroke-width="6"
          />
          <polygon
            points="50,95 7,22.5 93,22.5"
            fill="none"
            stroke="#c8a04a"
            stroke-width="6"
          />
        </svg>
        <div>
          <div class="logo">CONGOY</div>
          <div class="logo-hebrew">שַׁיָּרָה</div>
        </div>
      </div>
      <div class="nav-links">
        <a href="about.html">About</a>
        <a href="events.html">Events</a>
        <a href="join.html">Join</a>
      </div>
    </nav>

    <section class="hero">
      <!-- Flag-inspired stripes -->
      <div class="flag-stripe-top"></div>
      <div class="flag-stripe-bot"></div>

      <!-- Large background star -->
      <svg
        class="bg-star"
        viewBox="0 0 200 200"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <polygon
          points="100,10 186,155 14,155"
          fill="none"
          stroke="#1b4f8a"
          stroke-width="4"
        />
        <polygon
          points="100,190 14,45 186,45"
          fill="none"
          stroke="#1b4f8a"
          stroke-width="4"
        />
      </svg>

      <!-- Corner ornaments (geometric tile motif) -->
      <svg class="corner corner-tl" viewBox="0 0 120 120" fill="none">
        <path d="M0 40 L40 0 L40 40 Z" fill="#1b4f8a" />
        <path d="M0 80 L80 0" stroke="#c8a04a" stroke-width="2" />
        <rect x="0" y="0" width="40" height="2" fill="#c8a04a" />
        <rect x="0" y="0" width="2" height="40" fill="#c8a04a" />
      </svg>
      <svg class="corner corner-tr" viewBox="0 0 120 120" fill="none">
        <path d="M0 40 L40 0 L40 40 Z" fill="#1b4f8a" />
        <path d="M0 80 L80 0" stroke="#c8a04a" stroke-width="2" />
        <rect x="0" y="0" width="40" height="2" fill="#c8a04a" />
        <rect x="0" y="0" width="2" height="40" fill="#c8a04a" />
      </svg>
      <svg class="corner corner-bl" viewBox="0 0 120 120" fill="none">
        <path d="M0 40 L40 0 L40 40 Z" fill="#1b4f8a" />
        <path d="M0 80 L80 0" stroke="#c8a04a" stroke-width="2" />
        <rect x="0" y="0" width="40" height="2" fill="#c8a04a" />
        <rect x="0" y="0" width="2" height="40" fill="#c8a04a" />
      </svg>
      <svg class="corner corner-br" viewBox="0 0 120 120" fill="none">
        <path d="M0 40 L40 0 L40 40 Z" fill="#1b4f8a" />
        <path d="M0 80 L80 0" stroke="#c8a04a" stroke-width="2" />
        <rect x="0" y="0" width="40" height="2" fill="#c8a04a" />
        <rect x="0" y="0" width="2" height="40" fill="#c8a04a" />
      </svg>

      <div class="hero-inner">
        <!-- Menorah-inspired decorative bar -->
        <div class="menorah-dots">
          <span></span><span></span><span></span><span></span> <span></span
          ><span></span><span></span><span></span>
          <span></span>
        </div>

        <div class="hero-tag">Tel Aviv · Jerusalem · Beyond</div>

        <h1 class="hero-title">CONGOY</h1>
        <div class="hero-title-he">שַׁיָּרָה</div>

        <div class="divider"></div>

        <p class="hero-text">
          creative curated experiences for people, artists and spaces
        </p>

        <div class="hero-buttons">
          <a href="events.html" class="btn btn-primary">EVENTS</a>
          <a href="join.html" class="btn btn-outline">WAITLIST</a>
        </div>
      </div>
    </section>

    <footer>
      <div class="footer-inner">
        <div class="footer-logo">
          <svg width="22" height="22" viewBox="0 0 100 100" fill="none">
            <polygon
              points="50,5 93,77.5 7,77.5"
              fill="none"
              stroke="#c8a04a"
              stroke-width="8"
            />
            <polygon
              points="50,95 7,22.5 93,22.5"
              fill="none"
              stroke="#c8a04a"
              stroke-width="8"
            />
          </svg>
          CONGOY
        </div>
        <div class="footer-he">שַׁיָּרָה — יצירה, אמנות, חוויה</div>
        <div class="footer-copy">© 2026 · ALL RIGHTS RESERVED</div>
      </div>
    </footer>
  </body>
</html>
